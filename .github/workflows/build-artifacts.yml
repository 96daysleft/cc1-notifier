name: Build Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract and set version tag
        id: version
        run: |
          # Extract version from release tag
          VERSION="${{ github.event.release.tag_name }}"
          # Remove 'v' prefix if present
          CLEAN_VERSION="${VERSION#v}"
          # Set outputs for use in other steps
          echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          echo "full_tag=${VERSION}" >> $GITHUB_OUTPUT
          # Set environment variables
          echo "VERSION=${CLEAN_VERSION}" >> $GITHUB_ENV
          echo "FULL_TAG=${VERSION}" >> $GITHUB_ENV
          # Display version info
          echo "Release version: ${VERSION}"
          echo "Clean version: ${CLEAN_VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Create setup.py for packaging
        run: |
          cat > setup.py << 'EOF'
          from setuptools import setup, find_packages
          
          with open("README.md", "r", encoding="utf-8") as fh:
              long_description = fh.read()
          
          with open("requirements.txt", "r", encoding="utf-8") as fh:
              requirements = [line.strip() for line in fh if line.strip() and not line.startswith("#")]
          
          setup(
              name="cc1-notifier",
              version="${{ steps.version.outputs.version }}",
              author="Centauri Carbon",
              description="Centauri Alert Notifier - WebSocket to Discord notification service",
              long_description=long_description,
              long_description_content_type="text/markdown",
              packages=find_packages(),
              include_package_data=True,
              install_requires=requirements,
              python_requires=">=3.11",
              entry_points={
                  "console_scripts": [
                      "cc1-notifier=main:main",
                  ],
              },
              classifiers=[
                  "Development Status :: 4 - Beta",
                  "Intended Audience :: System Administrators",
                  "License :: OSI Approved :: MIT License",
                  "Operating System :: OS Independent",
                  "Programming Language :: Python :: 3",
                  "Programming Language :: Python :: 3.11",
              ],
          )
          EOF

      - name: Build Python package
        run: |
          python -m build

      - name: Create source archive
        run: |
          tar -czf cc1-notifier-${{ steps.version.outputs.full_tag }}-source.tar.gz \
            --exclude='.git*' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='dist' \
            --exclude='build' \
            .

      - name: Upload wheel to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./dist/cc1_notifier-${{ steps.version.outputs.version }}-py3-none-any.whl
          asset_name: cc1_notifier-${{ steps.version.outputs.full_tag }}-py3-none-any.whl
          asset_content_type: application/octet-stream

      - name: Upload source distribution to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./dist/cc1-notifier-${{ steps.version.outputs.version }}.tar.gz
          asset_name: cc1-notifier-${{ steps.version.outputs.full_tag }}-source.tar.gz
          asset_content_type: application/gzip

      - name: Upload source archive to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./cc1-notifier-${{ steps.version.outputs.full_tag }}-source.tar.gz
          asset_name: cc1-notifier-${{ steps.version.outputs.full_tag }}-source.tar.gz
          asset_content_type: application/gzip