name: Build Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract and set version tag
        id: version
        run: |
          # github.ref_name is the tag name (e.g. v1.2.3) on a tag push
          VERSION="${{ github.ref_name }}"
          # Remove 'v' prefix if present
          CLEAN_VERSION="${VERSION#v}"
          echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          echo "full_tag=${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION=${CLEAN_VERSION}" >> $GITHUB_ENV
          echo "FULL_TAG=${VERSION}" >> $GITHUB_ENV
          echo "Release version: ${VERSION}"
          echo "Clean version: ${CLEAN_VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools setuptools-scm

      - name: Build Python package
        run: |
          python -m build

      - name: Create source archive
        id: source-archive
        run: |
          tar_file="/tmp/cc1-notifier-${{ steps.version.outputs.full_tag }}-source.tar.gz"
          tar -czf ${tar_file} \
            --exclude='.git*' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='dist' \
            --exclude='build' \
            .
          mv ${tar_file}  .
          echo "tar-file=${tar_file} >> $GITHUB_OUTPUT

      - name: Upload artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAR_FILE: ${{ steps.source-archive.outputs.tar-file }}
        run: |
          gh release upload ${{ steps.version.outputs.full_tag }} \
            ./dist/cc1_notifier-${{ steps.version.outputs.version }}-py3-none-any.whl \
            ${TAR_FILE} \
            ./cc1-notifier-${{ steps.version.outputs.full_tag }}-source.tar.gz \
            --clobber