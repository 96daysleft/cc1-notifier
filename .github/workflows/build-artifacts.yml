name: Build Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract and set version tag
        id: version
        run: |
          # github.ref_name is the tag name (e.g. v1.2.3) on a tag push
          VERSION="${{ github.ref_name }}"
          # Remove 'v' prefix if present
          CLEAN_VERSION="${VERSION#v}"
          echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          echo "full_tag=${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION=${CLEAN_VERSION}" >> $GITHUB_ENV
          echo "FULL_TAG=${VERSION}" >> $GITHUB_ENV
          echo "Release version: ${VERSION}"
          echo "Clean version: ${CLEAN_VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools setuptools-scm

      - name: Build Python package
        run: |
          python -m build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

      - name: Create a Release
        uses: elgohr/Github-Release-Action@v5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          title: ${{ github_env.FULL_TAG }}