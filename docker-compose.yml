version: '3.8'

services:
  cc1-notifier:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cc1-notifier
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    networks:
      - cc1-network
    healthcheck:
      test: ["CMD", "python", "-c", "print('Health check OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  cc1-network:
    driver: bridge
